<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D マインクラフト風</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; user-select: none; }
  canvas { display: block; }

  #crosshair { position: fixed; left: 50%; top: 50%; width: 22px; height: 22px;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 10; mix-blend-mode: difference; }
  #crosshair::before, #crosshair::after { content: ""; position: absolute; background: #fff; }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

  #hotbar { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
    display: flex; gap: 5px; z-index: 10; padding: 5px; border-radius: 6px;
    background: rgba(0,0,0,0.35); }
  .slot { width: 56px; height: 66px; border: 2px solid rgba(0,0,0,0.4); border-radius: 4px;
    background: rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; padding-top: 5px; cursor: pointer; transition: transform .08s; }
  .slot.on { border-color: #fff; transform: translateY(-5px);
    box-shadow: 0 0 10px rgba(255,255,255,0.45); }
  .slot .sw { width: 34px; height: 34px; image-rendering: pixelated; background-size: cover;
    border: 1px solid rgba(0,0,0,0.3); }
  .slot b { color: #fff; font-size: 10px; margin-top: 3px; opacity: .7; }
  .slot small { color: #fff; font-size: 11px; margin-top: 1px; }

  #stats { position: fixed; left: 10px; top: 10px; z-index: 10; color: #fff; font-size: 12px;
    line-height: 1.5; text-shadow: 0 1px 2px rgba(0,0,0,0.85); pointer-events: none; font-variant-numeric: tabular-nums; }

  #overlay { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; color: #fff; text-align: center;
    background: rgba(0,0,0,0.55); cursor: pointer; }
  #overlay h1 { font-size: 34px; letter-spacing: 2px; text-shadow: 0 3px 0 rgba(0,0,0,0.4); }
  #overlay .panel { background: rgba(0,0,0,0.4); padding: 18px 26px; border-radius: 10px;
    font-size: 15px; line-height: 1.9; }
  #overlay .key { display: inline-block; min-width: 20px; padding: 1px 7px; margin: 0 1px;
    background: #fff; color: #222; border-radius: 4px; font-weight: 700; font-size: 13px; }
  #overlay .go { font-size: 16px; opacity: .85; animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
</style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="stats"></div>
  <div id="hotbar"></div>
  <div id="overlay">
    <h1>⛏️ 3D マインクラフト風</h1>
    <div class="panel">
      <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移動　<span class="key">Shift</span> ダッシュ　<span class="key">Space</span> ジャンプ</div>
      <div>マウス 視点　<span class="key">左</span>クリック 壊す　<span class="key">右</span>クリック 置く</div>
      <div><span class="key">1</span>〜<span class="key">9</span> / ホイール ブロック選択　<span class="key">Esc</span> 一時停止</div>
    </div>
    <div class="go">クリックして開始</div>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
  import * as THREE from 'three';

  /* ============== 基本セットアップ ============== */
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x9ad0ec);
  scene.fog = new THREE.Fog(0x9ad0ec, 45, 105);

  const camera = new THREE.PerspectiveCamera(78, innerWidth / innerHeight, 0.05, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);
  const canvas = renderer.domElement;
  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  /* ============== テクスチャ生成（16x16 ドット絵） ============== */
  const rnd = (a, b) => a + Math.random() * (b - a);
  function tint(hex, f) {
    const r = Math.min(255, ((hex >> 16) & 255) * f) | 0;
    const g = Math.min(255, ((hex >> 8) & 255) * f) | 0;
    const b = Math.min(255, (hex & 255) * f) | 0;
    return `rgb(${r},${g},${b})`;
  }
  function makeTex(draw) {
    const S = 16, c = document.createElement('canvas');
    c.width = c.height = S;
    const g = c.getContext('2d');
    draw(g, S);
    const t = new THREE.CanvasTexture(c);
    t.magFilter = THREE.NearestFilter;
    t.minFilter = THREE.NearestMipmapNearestFilter;
    t.colorSpace = THREE.SRGBColorSpace;
    return t;
  }
  function noise(g, hex, lo, hi) {
    for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
      g.fillStyle = tint(hex, rnd(lo, hi));
      g.fillRect(x, y, 1, 1);
    }
  }
  function dots(g, hex, n, f) {
    for (let i = 0; i < n; i++) { g.fillStyle = tint(hex, f); g.fillRect(Math.random() * 16 | 0, Math.random() * 16 | 0, 1, 1); }
  }

  const TX = {
    dirt:  makeTex(g => { noise(g, 0x8a5a2b, 0.78, 1.12); dots(g, 0x8a5a2b, 14, 0.6); }),
    grassTop: makeTex(g => { noise(g, 0x6ab04c, 0.82, 1.12); dots(g, 0x6ab04c, 16, 0.7); }),
    grassSide: makeTex(g => {
      noise(g, 0x8a5a2b, 0.78, 1.12);
      for (let x = 0; x < 16; x++) {
        const h = 3 + (Math.random() < 0.4 ? 1 : 0);
        for (let y = 0; y < h; y++) { g.fillStyle = tint(0x6ab04c, rnd(0.82, 1.12)); g.fillRect(x, y, 1, 1); }
      }
    }),
    stone: makeTex(g => { noise(g, 0x8b9094, 0.86, 1.08); dots(g, 0x8b9094, 18, 0.72); }),
    bark:  makeTex(g => {
      for (let x = 0; x < 16; x++) { const c = rnd(0.8, 1.1); for (let y = 0; y < 16; y++) { g.fillStyle = tint(0x6d4c1b, c * rnd(0.95, 1.05)); g.fillRect(x, y, 1, 1); } }
      for (let i = 0; i < 4; i++) { const x = Math.random() * 16 | 0; for (let y = 0; y < 16; y++) { g.fillStyle = tint(0x6d4c1b, 0.7); g.fillRect(x, y, 1, 1); } }
    }),
    logTop: makeTex(g => {
      noise(g, 0xb5894e, 0.92, 1.05);
      for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
        const d = Math.hypot(x - 7.5, y - 7.5) | 0;
        if (d % 2 === 0) { g.fillStyle = tint(0x6d4c1b, 0.85); g.fillRect(x, y, 1, 1); }
      }
    }),
    leaves: makeTex(g => { noise(g, 0x3f8a2e, 0.68, 1.18); dots(g, 0x2c5e20, 26, 0.8); }),
    sand:  makeTex(g => { noise(g, 0xe6da9c, 0.93, 1.05); dots(g, 0xe6da9c, 12, 0.85); }),
    planks: makeTex(g => {
      noise(g, 0xb5824a, 0.93, 1.05);
      for (let y = 0; y < 16; y += 4) { g.fillStyle = tint(0x6d4c1b, 0.75); g.fillRect(0, y, 16, 1); }
      for (let y = 0; y < 16; y += 4) { const sx = (y / 4) % 2 ? 8 : 0; g.fillStyle = tint(0x6d4c1b, 0.8); g.fillRect(sx, y, 1, 4); }
    }),
    brick: makeTex(g => {
      noise(g, 0xa83a2a, 0.9, 1.08);
      g.fillStyle = '#cdbfa8';
      for (let y = 3; y < 16; y += 4) g.fillRect(0, y, 16, 1);
      for (let y = 0; y < 16; y += 4) { const off = ((y / 4) % 2) ? 2 : 6; for (let x = off; x < 16; x += 8) g.fillRect(x, y, 1, 4); }
    }),
    glass: makeTex(g => {
      g.clearRect(0, 0, 16, 16);
      g.fillStyle = 'rgba(180,232,255,0.22)'; g.fillRect(0, 0, 16, 16);
      g.fillStyle = 'rgba(225,247,255,0.85)';
      g.fillRect(0, 0, 16, 1); g.fillRect(0, 15, 16, 1); g.fillRect(0, 0, 1, 16); g.fillRect(15, 0, 1, 16);
      g.fillStyle = 'rgba(255,255,255,0.45)'; g.fillRect(3, 2, 1, 6); g.fillRect(4, 2, 1, 3);
    }),
    water: makeTex(g => { for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) { g.fillStyle = `rgba(${48 + (Math.random() * 20 | 0)},${120 + (Math.random() * 20 | 0)},${216},0.72)`; g.fillRect(x, y, 1, 1); } }),
  };

  /* ============== ブロック種別（面ごとの明るさ＝MC風シェーディング） ============== */
  const FACE_B = [0.62, 0.62, 1.0, 0.5, 0.8, 0.8]; // +X,-X,+Y(上),-Y(下),+Z,-Z
  function faceMats(tex, opt = {}) {
    return FACE_B.map((b, i) => new THREE.MeshBasicMaterial({
      map: Array.isArray(tex) ? tex[i] : tex,
      color: new THREE.Color(b, b, b),
      transparent: !!opt.transparent,
      opacity: opt.opacity ?? 1,
      depthWrite: opt.depthWrite ?? true,
      side: THREE.FrontSide,
    }));
  }
  const T = TX;
  const TYPES = [
    { name: '草',     color: 0x6ab04c, icon: T.grassSide, mats: faceMats([T.grassSide, T.grassSide, T.grassTop, T.dirt, T.grassSide, T.grassSide]) },
    { name: '土',     color: 0x8a5a2b, icon: T.dirt,      mats: faceMats(T.dirt) },
    { name: '石',     color: 0x8b9094, icon: T.stone,     mats: faceMats(T.stone) },
    { name: '丸太',   color: 0x6d4c1b, icon: T.bark,      mats: faceMats([T.bark, T.bark, T.logTop, T.logTop, T.bark, T.bark]) },
    { name: '葉',     color: 0x3f8a2e, icon: T.leaves,    mats: faceMats(T.leaves) },
    { name: '砂',     color: 0xe6da9c, icon: T.sand,      mats: faceMats(T.sand) },
    { name: '板材',   color: 0xb5824a, icon: T.planks,    mats: faceMats(T.planks) },
    { name: 'レンガ', color: 0xa83a2a, icon: T.brick,     mats: faceMats(T.brick) },
    { name: 'ガラス', color: 0xbfe9ff, icon: T.glass,     mats: faceMats(T.glass, { transparent: true, depthWrite: false }) },
    { name: '水',     color: 0x3a78d8, icon: T.water,     mats: faceMats(T.water, { transparent: true, depthWrite: false }), solid: false },
  ];
  const WATER = 9;
  const HOTBAR = [0, 1, 2, 3, 4, 5, 6, 7, 8];

  /* ============== インスタンスメッシュ ============== */
  const GEO = new THREE.BoxGeometry(1, 1, 1);
  const MAX = 70000;
  const meshes = [];
  const coordsByType = [];
  for (const t of TYPES) {
    const mesh = new THREE.InstancedMesh(GEO, t.mats, MAX);
    mesh.count = 0;
    mesh.frustumCulled = false;
    scene.add(mesh);
    meshes.push(mesh);
    coordsByType.push([]);
  }

  /* ============== ワールドデータ ============== */
  const world = new Map();
  const key = (x, y, z) => x + ',' + y + ',' + z;
  const isSolid = (x, y, z) => { const t = world.get(key(x, y, z)); return t !== undefined && TYPES[t].solid !== false; };
  function setBlock(x, y, z, type) { if (type == null) world.delete(key(x, y, z)); else world.set(key(x, y, z), type); }

  function heightAt(x, z) {
    const n = Math.sin(x * 0.18) * Math.cos(z * 0.18) * 2.2
            + Math.sin(x * 0.06 + z * 0.09) * 3.0
            + Math.cos(z * 0.13 - x * 0.07) * 1.6;
    return Math.round(7 + n);
  }

  const R = 24, SEA = 5;
  for (let x = -R; x <= R; x++) {
    for (let z = -R; z <= R; z++) {
      const h = heightAt(x, z);
      for (let y = 0; y <= h; y++) {
        let type;
        if (y === h) type = (h <= SEA ? 5 : 0);     // 海面以下は砂、それ以上は草
        else if (y >= h - 3) type = 1;               // 土
        else type = 2;                               // 石
        setBlock(x, y, z, type);
      }
      for (let y = h + 1; y <= SEA; y++) setBlock(x, y, z, WATER);  // 水を満たす
    }
  }
  function plantTree(x, z) {
    const base = heightAt(x, z) + 1, trunk = 4 + (Math.random() * 2 | 0), top = base + trunk;
    for (let i = 0; i < trunk; i++) setBlock(x, base + i, z, 3);
    for (let dx = -2; dx <= 2; dx++) for (let dz = -2; dz <= 2; dz++) for (let dy = -1; dy <= 1; dy++) {
      if (Math.abs(dx) + Math.abs(dz) + Math.abs(dy) > 3) continue;
      if (!isSolid(x + dx, top + dy, z + dz)) setBlock(x + dx, top + dy, z + dz, 4);
    }
    setBlock(x, top + 1, z, 4);
  }
  for (let i = 0; i < 28; i++) {
    const x = (Math.random() * 2 * R - R) | 0, z = (Math.random() * 2 * R - R) | 0;
    if (heightAt(x, z) > SEA) plantTree(x, z);
  }

  const _m = new THREE.Matrix4();
  function rebuild() {
    for (const a of coordsByType) a.length = 0;
    for (const [k, t] of world) { const c = k.split(','); coordsByType[t].push([+c[0], +c[1], +c[2]]); }
    for (let t = 0; t < meshes.length; t++) {
      const arr = coordsByType[t], mesh = meshes[t];
      for (let i = 0; i < arr.length; i++) { _m.makeTranslation(arr[i][0] + 0.5, arr[i][1] + 0.5, arr[i][2] + 0.5); mesh.setMatrixAt(i, _m); }
      mesh.count = arr.length;
      mesh.instanceMatrix.needsUpdate = true;
    }
  }
  rebuild();

  /* ============== 空・雲 ============== */
  const cloudTex = (() => {
    const N = 32, c = document.createElement('canvas'); c.width = c.height = N;
    const g = c.getContext('2d'); g.clearRect(0, 0, N, N); g.fillStyle = 'rgba(255,255,255,0.92)';
    for (let i = 0; i < 16; i++) g.fillRect(Math.random() * N | 0, Math.random() * N | 0, 2 + (Math.random() * 6 | 0), 2 + (Math.random() * 5 | 0));
    const t = new THREE.CanvasTexture(c); t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
    t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(6, 6); t.colorSpace = THREE.SRGBColorSpace; return t;
  })();
  const clouds = new THREE.Mesh(new THREE.PlaneGeometry(600, 600),
    new THREE.MeshBasicMaterial({ map: cloudTex, transparent: true, opacity: 0.8, depthWrite: false, fog: false }));
  clouds.rotation.x = Math.PI / 2;
  clouds.position.y = 42;
  scene.add(clouds);

  /* ============== ターゲット枠 ============== */
  const highlight = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(1.003, 1.003, 1.003)),
    new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.55 }));
  highlight.visible = false;
  scene.add(highlight);

  /* ============== 破壊パーティクル ============== */
  const pGeo = new THREE.BoxGeometry(0.16, 0.16, 0.16);
  const pPool = [];
  for (let i = 0; i < 80; i++) {
    const m = new THREE.Mesh(pGeo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
    m.visible = false; scene.add(m);
    pPool.push({ mesh: m, vel: new THREE.Vector3(), life: 0 });
  }
  let pIdx = 0;
  function burst(x, y, z, color) {
    for (let i = 0; i < 9; i++) {
      const p = pPool[pIdx++ % pPool.length];
      p.mesh.material.color.setHex(color);
      p.mesh.position.set(x + 0.5 + rnd(-0.3, 0.3), y + 0.5 + rnd(-0.3, 0.3), z + 0.5 + rnd(-0.3, 0.3));
      p.vel.set(rnd(-2.5, 2.5), rnd(1.5, 4.5), rnd(-2.5, 2.5));
      p.mesh.scale.setScalar(rnd(0.5, 1.3));
      p.life = 0.45 + Math.random() * 0.3;
      p.mesh.visible = true;
    }
  }

  /* ============== 効果音 ============== */
  let actx = null;
  function initAudio() { if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} } }
  function thock(freq) {
    if (!actx) return;
    const t = actx.currentTime, o = actx.createOscillator(), g = actx.createGain();
    o.type = 'square'; o.frequency.setValueAtTime(freq, t); o.frequency.exponentialRampToValueAtTime(freq * 0.6, t + 0.08);
    g.gain.setValueAtTime(0.08, t); g.gain.exponentialRampToValueAtTime(0.0008, t + 0.12);
    o.connect(g).connect(actx.destination); o.start(t); o.stop(t + 0.13);
  }

  /* ============== プレイヤー & 物理 ============== */
  const player = { pos: new THREE.Vector3(0.5, heightAt(0, 0) + 4, 0.5), vel: new THREE.Vector3(), onGround: false };
  let yaw = 0, pitch = 0;
  const EYE = 1.6, HALF = 0.3, TOP = 0.2;
  const WALK = 4.6, SPRINT = 6.3, GRAVITY = 30, JUMP = 9, REACH = 6;

  function bodyCollides(px, py, pz) {
    const x0 = Math.floor(px - HALF), x1 = Math.floor(px + HALF);
    const y0 = Math.floor(py - EYE), y1 = Math.floor(py + TOP);
    const z0 = Math.floor(pz - HALF), z1 = Math.floor(pz + HALF);
    for (let x = x0; x <= x1; x++) for (let y = y0; y <= y1; y++) for (let z = z0; z <= z1; z++) if (isSolid(x, y, z)) return true;
    return false;
  }
  function moveAxis(axis, d) {
    if (d === 0) return false;
    const old = player.pos[axis];
    player.pos[axis] += d;
    if (bodyCollides(player.pos.x, player.pos.y, player.pos.z)) { player.pos[axis] = old; return true; }
    return false;
  }
  function overlapsPlayer(x, y, z) {
    const p = player.pos;
    return (x + 1 > p.x - HALF && x < p.x + HALF && z + 1 > p.z - HALF && z < p.z + HALF && y + 1 > p.y - EYE && y < p.y + TOP);
  }

  /* ============== ボクセルレイキャスト (Amanatides & Woo) ============== */
  const mod = (a, n) => ((a % n) + n) % n;
  function intbound(s, ds) { if (ds < 0) return intbound(-s, -ds); return (1 - mod(s, 1)) / ds; }
  function pickTarget() {
    const o = camera.position, dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
    let x = Math.floor(o.x), y = Math.floor(o.y), z = Math.floor(o.z);
    const sx = Math.sign(dir.x), sy = Math.sign(dir.y), sz = Math.sign(dir.z);
    let tx = intbound(o.x, dir.x), ty = intbound(o.y, dir.y), tz = intbound(o.z, dir.z);
    const dx = sx !== 0 ? 1 / Math.abs(dir.x) : Infinity, dy = sy !== 0 ? 1 / Math.abs(dir.y) : Infinity, dz = sz !== 0 ? 1 / Math.abs(dir.z) : Infinity;
    let nx = 0, ny = 0, nz = 0, t = 0;
    for (let i = 0; i < 256 && t <= REACH; i++) {
      if (isSolid(x, y, z)) return { block: [x, y, z], normal: [nx, ny, nz] };
      if (tx < ty) { if (tx < tz) { x += sx; t = tx; tx += dx; nx = -sx; ny = 0; nz = 0; } else { z += sz; t = tz; tz += dz; nx = 0; ny = 0; nz = -sz; } }
      else { if (ty < tz) { y += sy; t = ty; ty += dy; nx = 0; ny = -sy; nz = 0; } else { z += sz; t = tz; tz += dz; nx = 0; ny = 0; nz = -sz; } }
    }
    return null;
  }
  function breakBlock() {
    const tg = pickTarget(); if (!tg) return;
    const [x, y, z] = tg.block;
    burst(x, y, z, TYPES[world.get(key(x, y, z))].color);
    setBlock(x, y, z, null); rebuild(); thock(150);
  }
  function placeBlock() {
    const tg = pickTarget(); if (!tg) return;
    const x = tg.block[0] + tg.normal[0], y = tg.block[1] + tg.normal[1], z = tg.block[2] + tg.normal[2];
    if (isSolid(x, y, z) || overlapsPlayer(x, y, z)) return;
    setBlock(x, y, z, HOTBAR[selected]); rebuild(); thock(260);
  }

  /* ============== 入力・開始/一時停止 ============== */
  const keys = {};
  let selected = 0, started = false;
  const overlay = document.getElementById('overlay');

  function startGame() {
    if (started) return;
    started = true; overlay.style.display = 'none'; initAudio();
    const p = canvas.requestPointerLock && canvas.requestPointerLock();
    if (p && p.catch) p.catch(() => {});
  }
  function pause() {
    if (!started) return;
    started = false; overlay.style.display = 'flex';
    if (document.pointerLockElement === canvas) document.exitPointerLock();
  }
  window.__startGame = startGame; // デバッグ用

  overlay.addEventListener('click', startGame);
  canvas.addEventListener('mousedown', e => {
    if (!started) { startGame(); return; }
    if (e.button === 0) breakBlock(); else if (e.button === 2) placeBlock();
  });
  addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('mousemove', e => {
    if (!started) return;
    yaw -= e.movementX * 0.0022; pitch -= e.movementY * 0.0022;
    const lim = Math.PI / 2 - 0.01; pitch = Math.max(-lim, Math.min(lim, pitch));
  });
  document.addEventListener('pointerlockchange', () => { if (started && document.pointerLockElement !== canvas) pause(); });
  addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Escape') pause();
    if (e.code.startsWith('Digit')) { const n = +e.code.slice(5); if (n >= 1 && n <= 9) selectSlot(n - 1); }
    if (['Space', 'KeyW', 'KeyA', 'KeyS', 'KeyD'].includes(e.code)) e.preventDefault();
  });
  addEventListener('keyup', e => { keys[e.code] = false; });
  addEventListener('wheel', e => { if (started) selectSlot((selected + (e.deltaY > 0 ? 1 : -1) + HOTBAR.length) % HOTBAR.length); }, { passive: true });

  /* ============== ホットバー UI ============== */
  const hotbar = document.getElementById('hotbar');
  HOTBAR.forEach((typeIdx, i) => {
    const slot = document.createElement('div'); slot.className = 'slot';
    slot.innerHTML = `<span class="sw"></span><b>${i + 1}</b><small>${TYPES[typeIdx].name}</small>`;
    slot.querySelector('.sw').style.backgroundImage = `url(${TYPES[typeIdx].icon.image.toDataURL()})`;
    slot.addEventListener('click', () => selectSlot(i));
    hotbar.appendChild(slot);
  });
  function selectSlot(i) { selected = i; [...hotbar.children].forEach((s, idx) => s.classList.toggle('on', idx === selected)); }
  selectSlot(0);
  const stats = document.getElementById('stats');

  /* ============== メインループ ============== */
  let prev = performance.now();
  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now(), dt = Math.min((now - prev) / 1000, 0.05); prev = now;

    if (started) {
      const f = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
      const s = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);
      let mx = -Math.sin(yaw) * f + Math.cos(yaw) * s, mz = -Math.cos(yaw) * f - Math.sin(yaw) * s;
      const len = Math.hypot(mx, mz); if (len > 0) { mx /= len; mz /= len; }
      const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? SPRINT : WALK;
      player.vel.x = mx * spd; player.vel.z = mz * spd;
      player.vel.y -= GRAVITY * dt;
      if (keys['Space'] && player.onGround) { player.vel.y = JUMP; player.onGround = false; }
      moveAxis('x', player.vel.x * dt); moveAxis('z', player.vel.z * dt);
      player.onGround = false;
      if (moveAxis('y', player.vel.y * dt)) { if (player.vel.y < 0) player.onGround = true; player.vel.y = 0; }
      if (player.pos.y < -30) { player.pos.set(0.5, heightAt(0, 0) + 4, 0.5); player.vel.set(0, 0, 0); }
    }

    camera.position.copy(player.pos);
    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

    // ターゲット枠
    const tg = started ? pickTarget() : null;
    if (tg) { highlight.position.set(tg.block[0] + 0.5, tg.block[1] + 0.5, tg.block[2] + 0.5); highlight.visible = true; }
    else highlight.visible = false;

    // パーティクル
    for (const p of pPool) {
      if (p.life > 0) { p.life -= dt; p.vel.y -= 20 * dt; p.mesh.position.addScaledVector(p.vel, dt); if (p.life <= 0) p.mesh.visible = false; }
    }

    // 雲を流す（プレイヤー上空に追従）
    cloudTex.offset.x += dt * 0.004;
    clouds.position.x = camera.position.x; clouds.position.z = camera.position.z;

    stats.textContent = `XYZ ${player.pos.x.toFixed(1)} / ${player.pos.y.toFixed(1)} / ${player.pos.z.toFixed(1)}　　選択: ${TYPES[HOTBAR[selected]].name}　　ブロック: ${world.size}`;
    renderer.render(scene, camera);
  }
  animate();
  window.__mcReady = true;
  </script>
</body>
</html>
