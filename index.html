<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D マインクラフト風</title>
<link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="crosshair"></div>
  <div id="stats"></div>
  <div id="venueDock"></div>
  <div id="hypeMeter">
    <div class="hype-row"><span class="hype-label">CROWD HYPE</span><span class="hype-value">0%</span></div>
    <div class="hype-track"><div class="hype-fill"></div></div>
    <div class="combo-line"></div>
  </div>
  <div id="screenPulse"></div>
  <div id="vibeToast"></div>
  <div id="hotbar"></div>
  <div id="overlay">
    <h1>⛏️ 3D マインクラフト風</h1>
    <div class="panel">
      <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移動　<span class="key">Shift</span> ダッシュ　<span class="key">Space</span> ジャンプ</div>
      <div>マウス 視点　<span class="key">左</span>クリック 壊す　<span class="key">右</span>クリック 置く</div>
      <div>ホイール / ホットバークリック ブロック選択　<span class="key">Esc</span> 一時停止</div>
      <div><span class="key">1</span>〜<span class="key">8</span> 小さな音楽会場を出現（旧 R〜P / [ も可）</div>
      <div>会場内で <span class="key">Z</span><span class="key">X</span><span class="key">C</span><span class="key">V</span> プレイヤーダンス</div>
      <div>DJ <span class="key">Q</span><span class="key">E</span>曲切替 <span class="key">J</span>フィルター <span class="key">K</span>クラッシュ <span class="key">L</span>ループ</div>
    </div>
    <div class="go">クリックして開始</div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
