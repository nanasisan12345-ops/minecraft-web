<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D マインクラフト風</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #cfe7f5;
    font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; user-select: none; }
  canvas { display: block; }

  #crosshair { position: fixed; left: 50%; top: 50%; width: 22px; height: 22px;
    transform: translate(-50%, -50%); pointer-events: none; z-index: 10; mix-blend-mode: difference; }
  #crosshair::before, #crosshair::after { content: ""; position: absolute; background: #fff; }
  #crosshair::before { left: 50%; top: 0; width: 2px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 2px; width: 100%; transform: translateY(-50%); }

  #hotbar { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
    display: flex; gap: 5px; z-index: 10; padding: 5px; border-radius: 6px;
    background: rgba(0,0,0,0.35); }
  .slot { width: 56px; height: 66px; border: 2px solid rgba(0,0,0,0.4); border-radius: 4px;
    background: rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start; padding-top: 5px; cursor: pointer; transition: transform .08s; }
  .slot.on { border-color: #fff; transform: translateY(-5px);
    box-shadow: 0 0 10px rgba(255,255,255,0.45); }
  .slot .sw { width: 34px; height: 34px; image-rendering: pixelated; background-size: cover;
    border: 1px solid rgba(0,0,0,0.3); }
  .slot b { color: #fff; font-size: 10px; margin-top: 3px; opacity: .7; }
  .slot small { color: #fff; font-size: 11px; margin-top: 1px; }

  #stats { position: fixed; left: 10px; top: 10px; z-index: 10; color: #fff; font-size: 12px;
    line-height: 1.5; text-shadow: 0 1px 2px rgba(0,0,0,0.85); pointer-events: none; font-variant-numeric: tabular-nums; }

  #overlay { position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; color: #fff; text-align: center;
    background: rgba(0,0,0,0.55); cursor: pointer; }
  #overlay h1 { font-size: 34px; letter-spacing: 2px; text-shadow: 0 3px 0 rgba(0,0,0,0.4); }
  #overlay .panel { background: rgba(0,0,0,0.4); padding: 18px 26px; border-radius: 10px;
    font-size: 15px; line-height: 1.9; }
  #overlay .key { display: inline-block; min-width: 20px; padding: 1px 7px; margin: 0 1px;
    background: #fff; color: #222; border-radius: 4px; font-weight: 700; font-size: 13px; }
  #overlay .go { font-size: 16px; opacity: .85; animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: .35; } }
</style>
</head>
<body>
  <div id="crosshair"></div>
  <div id="stats"></div>
  <div id="hotbar"></div>
  <div id="overlay">
    <h1>⛏️ 3D マインクラフト風</h1>
    <div class="panel">
      <div><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 移動　<span class="key">Shift</span> ダッシュ　<span class="key">Space</span> ジャンプ</div>
      <div>マウス 視点　<span class="key">左</span>クリック 壊す　<span class="key">右</span>クリック 置く</div>
      <div><span class="key">1</span>〜<span class="key">9</span> / ホイール ブロック選択　<span class="key">Esc</span> 一時停止</div>
      <div><span class="key">R</span><span class="key">T</span><span class="key">Y</span><span class="key">U</span><span class="key">I</span><span class="key">O</span><span class="key">P</span> 小さな音楽会場を出現</div>
    </div>
    <div class="go">クリックして開始</div>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>

  <script type="module">
  import * as THREE from 'three';

  /* ============== 基本セットアップ ============== */
  const HORIZON = 0xcfe7f5;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(HORIZON);
  scene.fog = new THREE.Fog(HORIZON, 16, 32);

  const camera = new THREE.PerspectiveCamera(78, innerWidth / innerHeight, 0.05, 1200);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);
  const canvas = renderer.domElement;
  addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  /* ============== ライト（太陽＋空のフィル光） ============== */
  const hemi = new THREE.HemisphereLight(0xcfe7f5, 0x55503f, 0.85);
  scene.add(hemi);
  const sun = new THREE.DirectionalLight(0xfff4e0, 1.15);
  const SUN_OFFSET = new THREE.Vector3(48, 90, 32);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 20;
  sun.shadow.camera.far = 240;
  const SD = 34;
  sun.shadow.camera.left = -SD; sun.shadow.camera.right = SD;
  sun.shadow.camera.top = SD; sun.shadow.camera.bottom = -SD;
  sun.shadow.bias = -0.0006;
  scene.add(sun);
  scene.add(sun.target);

  /* ============== 空ドーム（グラデーション） ============== */
  const skyGeo = new THREE.SphereGeometry(600, 32, 16);
  {
    const pos = skyGeo.attributes.position, colors = [];
    const cTop = new THREE.Color(0x3f86d8), cBot = new THREE.Color(0xdceff7);
    for (let i = 0; i < pos.count; i++) {
      const yn = pos.getY(i) / 600;
      const c = cBot.clone().lerp(cTop, THREE.MathUtils.clamp((yn + 0.05) / 0.55, 0, 1));
      colors.push(c.r, c.g, c.b);
    }
    skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  }
  const sky = new THREE.Mesh(skyGeo, new THREE.MeshBasicMaterial({ side: THREE.BackSide, vertexColors: true, fog: false, depthWrite: false }));
  scene.add(sky);

  /* ============== テクスチャ生成（32x32 ドット絵） ============== */
  const TEX_S = 32;
  const rnd = (a, b) => a + Math.random() * (b - a);
  function tint(hex, f) {
    const r = Math.min(255, ((hex >> 16) & 255) * f) | 0;
    const g = Math.min(255, ((hex >> 8) & 255) * f) | 0;
    const b = Math.min(255, (hex & 255) * f) | 0;
    return `rgb(${r},${g},${b})`;
  }
  function makeTex(draw) {
    const S = TEX_S, c = document.createElement('canvas');
    c.width = c.height = S;
    const g = c.getContext('2d');
    draw(g, S);
    const t = new THREE.CanvasTexture(c);
    t.magFilter = THREE.NearestFilter;
    t.minFilter = THREE.NearestMipmapNearestFilter;
    t.colorSpace = THREE.SRGBColorSpace;
    t.anisotropy = 4;
    return t;
  }
  function noise(g, S, hex, lo, hi) {
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) { g.fillStyle = tint(hex, rnd(lo, hi)); g.fillRect(x, y, 1, 1); }
  }
  function dots(g, S, hex, dens, f) {
    const n = Math.round(S * S * dens);
    for (let i = 0; i < n; i++) { g.fillStyle = tint(hex, f); g.fillRect(Math.random() * S | 0, Math.random() * S | 0, 1, 1); }
  }
  // 明度差から法線マップを生成し、表面の凹凸を光で表現する
  function normalFromCanvas(canvas, strength) {
    const S = canvas.width, src = canvas.getContext('2d').getImageData(0, 0, S, S).data;
    const lum = (x, y) => { const i = ((((y % S) + S) % S) * S + (((x % S) + S) % S)) * 4; return (src[i] * 0.299 + src[i + 1] * 0.587 + src[i + 2] * 0.114) / 255; };
    const out = document.createElement('canvas'); out.width = out.height = S;
    const og = out.getContext('2d'), img = og.createImageData(S, S);
    for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) {
      let nx = (lum(x - 1, y) - lum(x + 1, y)) * strength, ny = (lum(x, y - 1) - lum(x, y + 1)) * strength, nz = 1;
      const l = Math.hypot(nx, ny, nz) || 1; nx /= l; ny /= l; nz /= l;
      const i = (y * S + x) * 4;
      img.data[i] = (nx * 0.5 + 0.5) * 255; img.data[i + 1] = (ny * 0.5 + 0.5) * 255; img.data[i + 2] = (nz * 0.5 + 0.5) * 255; img.data[i + 3] = 255;
    }
    og.putImageData(img, 0, 0);
    const t = new THREE.CanvasTexture(out); t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestMipmapNearestFilter; return t;
  }
  const TX = {
    dirt: makeTex((g, S) => { noise(g, S, 0x8a5a2b, 0.78, 1.12); dots(g, S, 0x5f4020, 0.06, 0.7); for (let i = 0; i < 5; i++) { g.fillStyle = tint(0x9aa0a4, rnd(0.8, 1)); g.fillRect(Math.random() * S | 0, Math.random() * S | 0, 2, 2); } }),
    grassTop: makeTex((g, S) => { noise(g, S, 0x6ab04c, 0.8, 1.14); dots(g, S, 0x4f8f38, 0.05, 0.85); dots(g, S, 0x83c95f, 0.04, 1.1); }),
    grassSide: makeTex((g, S) => {
      noise(g, S, 0x8a5a2b, 0.78, 1.12);
      const base = (S * 0.28) | 0;
      for (let x = 0; x < S; x++) { const h = base + (Math.random() * (S * 0.18) | 0); for (let y = 0; y < h; y++) { g.fillStyle = tint(0x6ab04c, rnd(0.8, 1.14)); g.fillRect(x, y, 1, 1); } }
    }),
    stone: makeTex((g, S) => {
      noise(g, S, 0x8b9094, 0.86, 1.08); dots(g, S, 0x6f757a, 0.06, 0.85); dots(g, S, 0xa8adb2, 0.03, 1.05);
      g.strokeStyle = 'rgba(70,74,78,0.7)'; g.lineWidth = 1;
      for (let i = 0; i < 3; i++) { g.beginPath(); let px = Math.random() * S, py = Math.random() * S; g.moveTo(px, py); for (let s = 0; s < 4; s++) { px += rnd(-6, 6); py += rnd(-6, 6); g.lineTo(px, py); } g.stroke(); }
    }),
    snow: makeTex((g, S) => { noise(g, S, 0xf2f7ff, 0.94, 1.0); dots(g, S, 0xdfeaf8, 0.05, 0.97); for (let i = 0; i < 6; i++) { g.fillStyle = '#ffffff'; g.fillRect(Math.random() * S | 0, Math.random() * S | 0, 2, 2); } }),
    bark: makeTex((g, S) => {
      for (let x = 0; x < S; x++) { const c = rnd(0.78, 1.12); for (let y = 0; y < S; y++) { g.fillStyle = tint(0x6d4c1b, c * rnd(0.95, 1.06)); g.fillRect(x, y, 1, 1); } }
      for (let i = 0; i < 6; i++) { const x = Math.random() * S | 0; for (let y = 0; y < S; y++) { g.fillStyle = tint(0x4f3712, rnd(0.85, 1)); g.fillRect(x, y, 1, 1); } }
    }),
    logTop: makeTex((g, S) => { noise(g, S, 0xb5894e, 0.92, 1.05); const c = S / 2; for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) { const d = Math.hypot(x - c + 0.5, y - c + 0.5) | 0; if (d % 3 === 0) { g.fillStyle = tint(0x6d4c1b, 0.82); g.fillRect(x, y, 1, 1); } } }),
    leaves: makeTex((g, S) => { noise(g, S, 0x3f8a2e, 0.64, 1.22); dots(g, S, 0x2c5e20, 0.1, 0.8); dots(g, S, 0x5fb04a, 0.05, 1.15); }),
    sand: makeTex((g, S) => { noise(g, S, 0xe6da9c, 0.93, 1.05); dots(g, S, 0xcdbf83, 0.05, 0.9); g.fillStyle = 'rgba(255,255,255,0.16)'; for (let y = 4; y < S; y += 7) g.fillRect(0, y + (Math.random() * 2 | 0), S, 1); }),
    planks: makeTex((g, S) => {
      noise(g, S, 0xb5824a, 0.93, 1.05); const step = S / 4;
      for (let y = 0; y < S; y += step) { g.fillStyle = tint(0x6d4c1b, 0.72); g.fillRect(0, y, S, 1); }
      for (let row = 0; row * step < S; row++) { const y = row * step, sx = (row % 2) ? S / 2 : 0; g.fillStyle = tint(0x6d4c1b, 0.78); g.fillRect(sx, y, 1, step); }
    }),
    brick: makeTex((g, S) => {
      noise(g, S, 0xa83a2a, 0.9, 1.08); g.fillStyle = '#cdbfa8'; const r = S / 4;
      for (let row = 0; row * r < S; row++) {
        const y = row * r; g.fillRect(0, y, S, 2);
        const off = (row % 2) ? S / 2 : 0;
        for (let x = off; x < S; x += S / 2) g.fillRect(x, y, 2, r);
      }
    }),
    glass: makeTex((g, S) => {
      g.clearRect(0, 0, S, S); g.fillStyle = 'rgba(180,232,255,0.2)'; g.fillRect(0, 0, S, S);
      g.fillStyle = 'rgba(225,247,255,0.85)'; g.fillRect(0, 0, S, 2); g.fillRect(0, S - 2, S, 2); g.fillRect(0, 0, 2, S); g.fillRect(S - 2, 0, 2, S);
      g.fillStyle = 'rgba(255,255,255,0.4)'; g.fillRect(6, 4, 2, 12); g.fillRect(8, 4, 2, 6);
    }),
    water: makeTex((g, S) => { for (let y = 0; y < S; y++) for (let x = 0; x < S; x++) { g.fillStyle = `rgba(${44 + (Math.random() * 18 | 0)},${118 + (Math.random() * 18 | 0)},${210},0.8)`; g.fillRect(x, y, 1, 1); } g.fillStyle = 'rgba(255,255,255,0.12)'; for (let y = 3; y < S; y += 6) g.fillRect(0, y, S, 1); }),
  };
  TX.water.wrapS = TX.water.wrapT = THREE.RepeatWrapping;
  for (const k of ['dirt', 'grassTop', 'grassSide', 'stone', 'snow', 'bark', 'logTop', 'leaves', 'sand', 'planks', 'brick'])
    TX[k].userData.normalMap = normalFromCanvas(TX[k].image, 2.2);

  /* ============== ブロック種別（光を受けるマテリアル） ============== */
  const T = TX;
  function mkMat(map, opt) {
    const nm = (map.userData && map.userData.normalMap) || null;
    const m = new THREE.MeshPhongMaterial({
      map, color: 0xffffff, shininess: opt.shininess ?? 3, specular: new THREE.Color(opt.specular ?? 0x0c0c0c),
      transparent: !!opt.transparent, opacity: opt.opacity ?? 1, depthWrite: opt.depthWrite ?? true,
    });
    if (nm) { m.normalMap = nm; m.normalScale = new THREE.Vector2(0.6, 0.6); }
    return m;
  }
  function faceMats(tex, opt = {}) { return Array.isArray(tex) ? tex.map(t => mkMat(t, opt)) : mkMat(tex, opt); }

  const TYPES = [
    { name: '草',     color: 0x6ab04c, icon: T.grassSide, mats: faceMats([T.grassSide, T.grassSide, T.grassTop, T.dirt, T.grassSide, T.grassSide]) }, // 0
    { name: '土',     color: 0x8a5a2b, icon: T.dirt,      mats: faceMats(T.dirt) },   // 1
    { name: '石',     color: 0x8b9094, icon: T.stone,     mats: faceMats(T.stone) },  // 2
    { name: '丸太',   color: 0x6d4c1b, icon: T.bark,      mats: faceMats([T.bark, T.bark, T.logTop, T.logTop, T.bark, T.bark]) }, // 3
    { name: '葉',     color: 0x3f8a2e, icon: T.leaves,    mats: faceMats(T.leaves) }, // 4
    { name: '砂',     color: 0xe6da9c, icon: T.sand,      mats: faceMats(T.sand) },   // 5
    { name: '板材',   color: 0xb5824a, icon: T.planks,    mats: faceMats(T.planks) }, // 6
    { name: 'レンガ', color: 0xa83a2a, icon: T.brick,     mats: faceMats(T.brick) },  // 7
    { name: 'ガラス', color: 0xbfe9ff, icon: T.glass,     mats: faceMats(T.glass, { transparent: true, depthWrite: false }), transparent: true }, // 8
    { name: '水',     color: 0x3a78d8, icon: T.water,     mats: faceMats(T.water, { transparent: true, depthWrite: false, opacity: 0.72, shininess: 90, specular: 0x335577 }), transparent: true, solid: false }, // 9
    { name: '雪',     color: 0xf2f7ff, icon: T.snow,      mats: faceMats(T.snow) },   // 10
  ];
  const GRASS = 0, DIRT = 1, STONE = 2, SAND = 5, WATER = 9, SNOW = 10;
  const HOTBAR = [0, 1, 2, 10, 5, 3, 4, 6, 8]; // 草 土 石 雪 砂 丸太 葉 板材 ガラス

  /* ============== インスタンスメッシュ ============== */
  const GEO = new THREE.BoxGeometry(1, 1, 1);
  const MAX = 90000;
  const meshes = [];
  const coordsByType = [];
  for (const ty of TYPES) {
    const mesh = new THREE.InstancedMesh(GEO, ty.mats, MAX);
    mesh.count = 0;
    mesh.frustumCulled = false;
    if (!ty.transparent) { mesh.castShadow = true; mesh.receiveShadow = true; }
    scene.add(mesh);
    meshes.push(mesh);
    coordsByType.push([]);
  }

  /* ============== Perlinノイズ ============== */
  const perm = new Uint8Array(512);
  (() => {
    const p = new Uint8Array(256); for (let i = 0; i < 256; i++) p[i] = i;
    let s = 1337; const rng = () => (s = (s * 16807) % 2147483647) / 2147483647;
    for (let i = 255; i > 0; i--) { const j = (rng() * (i + 1)) | 0; const t = p[i]; p[i] = p[j]; p[j] = t; }
    for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
  })();
  const fade = t => t * t * t * (t * (t * 6 - 15) + 10);
  const lerp = (a, b, t) => a + (b - a) * t;
  function grad(h, x, y) { const u = (h & 1) ? -x : x, v = (h & 2) ? -y : y; return u + v; }
  function perlin2(x, y) {
    const X = Math.floor(x) & 255, Y = Math.floor(y) & 255;
    x -= Math.floor(x); y -= Math.floor(y);
    const u = fade(x), v = fade(y);
    const aa = perm[perm[X] + Y], ab = perm[perm[X] + Y + 1], ba = perm[perm[X + 1] + Y], bb = perm[perm[X + 1] + Y + 1];
    return lerp(lerp(grad(aa, x, y), grad(ba, x - 1, y), u), lerp(grad(ab, x, y - 1), grad(bb, x - 1, y - 1), u), v);
  }
  function fbm(x, y, oct, gain) {
    let amp = 1, freq = 1, sum = 0, norm = 0;
    for (let i = 0; i < oct; i++) { sum += amp * perlin2(x * freq, y * freq); norm += amp; amp *= gain; freq *= 2; }
    return sum / norm;
  }

  /* ============== ワールドデータ（スライディング窓＝無限ワールド） ============== */
  const world = new Map();
  const edits = new Map();   // プレイヤーの編集を永続化: "x,y,z" -> type | -1(空気)
  const key = (x, y, z) => x + ',' + y + ',' + z;
  const isSolid = (x, y, z) => { const t = world.get(key(x, y, z)); return t !== undefined && TYPES[t].solid !== false; };
  function setBlock(x, y, z, type) { if (type == null) world.delete(key(x, y, z)); else world.set(key(x, y, z), type); }

  const SEA = 8, SNOW_LINE = 30, ROCK_LINE = 23;
  function heightAt(x, z) {
    let e = (fbm(x * 0.0125, z * 0.0125, 5, 0.5) + 1) / 2;
    e = Math.pow(THREE.MathUtils.clamp(e, 0, 1), 1.7);
    const ridge = fbm(x * 0.045 + 100, z * 0.045 + 100, 3, 0.5) * 0.5;
    return Math.round(e * 36 + ridge * 5 + 3);
  }
  function topTypeAt(x, z, h) {
    if (h <= SEA + 1) return SAND;
    if (h >= SNOW_LINE) return SNOW;
    const slope = Math.max(Math.abs(h - heightAt(x + 1, z)), Math.abs(h - heightAt(x - 1, z)), Math.abs(h - heightAt(x, z + 1)), Math.abs(h - heightAt(x, z - 1)));
    if (slope >= 3 || h >= ROCK_LINE) return STONE;
    return GRASS;
  }

  // 生成範囲（窓）。プレイヤーが STEP マス動くたびに作り直す
  const WIN_R = 34, STEP = 16;
  function hash2(x, z) { const h = Math.sin(x * 127.1 + z * 311.7) * 43758.5453; return h - Math.floor(h); }
  const isTrunk = (x, z) => hash2(x, z) < 0.02;
  let winCX = 1e9, winCZ = 1e9;

  function regenWindow(ccx, ccz) {
    winCX = ccx; winCZ = ccz;
    world.clear();
    const x0 = ccx - WIN_R, x1 = ccx + WIN_R, z0 = ccz - WIN_R, z1 = ccz + WIN_R;
    for (let x = x0; x <= x1; x++) for (let z = z0; z <= z1; z++) {
      const h = heightAt(x, z), top = topTypeAt(x, z, h);
      for (let y = 0; y <= h; y++) {
        let type;
        if (y === h) type = top;
        else if ((top === GRASS || top === SAND) && y >= h - 3) type = DIRT;
        else type = STONE;
        world.set(key(x, y, z), type);
      }
      for (let y = h + 1; y <= SEA; y++) world.set(key(x, y, z), WATER);
    }
    // 木（決定論的。葉が窓境界をまたいでも欠けないよう少し外の幹も走査）
    const M = 3, inWin = (x, z) => x >= x0 && x <= x1 && z >= z0 && z <= z1;
    for (let x = x0 - M; x <= x1 + M; x++) for (let z = z0 - M; z <= z1 + M; z++) {
      if (!isTrunk(x, z)) continue;

      grp.add(d); RAVE.dancers.push(d);
    }
    return grp;
  }
  function raveOff() {
    if (!RAVE.on) return;
    scene.remove(RAVE.group);
    const s = RAVE.saved;
    sun.intensity = s.sun; hemi.intensity = s.hemi; scene.fog = s.fog; scene.background = s.bg; sky.visible = s.sky; clouds.visible = s.clouds;
    if (RAVE.master && actx) { try { RAVE.master.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + 0.15); } catch (e) {} }
    RAVE.on = false; RAVE.group = null; RAVE.kind = ''; raveInd.style.display = 'none';
  }
  function raveToggle(kind = 'classic') {
    initAudio();
    if (RAVE.on && RAVE.kind === kind) { raveOff(); return; }
    if (RAVE.on) raveOff();
    const cfg = RAVE_VENUES[kind];
    RAVE.kind = kind;
    const songList = SONGS[kind] || SONGS.classic, si = Math.floor(Math.random() * songList.length);
    RAVE.song = songList[si]; RAVE.songNo = si + 1; RAVE.bpm = RAVE.song.bpm || cfg.bpm;
    RAVE.group = buildRaveVenue(kind);
    const fx = Math.round(player.pos.x), fz = Math.round(player.pos.z), fy = Math.floor(player.pos.y - EYE);
    RAVE.group.position.set(fx, fy, fz); scene.add(RAVE.group);
    RAVE.saved = { sun: sun.intensity, hemi: hemi.intensity, fog: scene.fog, bg: scene.background.clone(), sky: sky.visible, clouds: clouds.visible };
    sun.intensity = 0.18; hemi.intensity = 0.22;
    const mood = {
      classic: { bg: 0x07050f, fog: 0x0a0612 },
      neon:    { bg: 0x120307, fog: 0x26080a },
      forest:  { bg: 0x03111f, fog: 0x05203a },
      laser:   { bg: 0x140c03, fog: 0x261506 },
      future:  { bg: 0x08051a, fog: 0x190a33 },
      bass:    { bg: 0x020903, fog: 0x06200c },
      chill:   { bg: 0x080a16, fog: 0x111832 },
    }[kind] || { bg: 0x07050f, fog: 0x0a0612 };
    scene.fog = new THREE.Fog(mood.fog, 8, 38); scene.background = new THREE.Color(mood.bg);
    sky.visible = false; clouds.visible = false;
    if (actx) {
      if (actx.state === 'suspended') actx.resume();
      const fx = RAVE_FX[kind] || RAVE_FX.classic, now = actx.currentTime;
      const out = actx.createGain(); out.gain.setValueAtTime(0.0001, now); out.gain.exponentialRampToValueAtTime(0.5, now + 0.4);
      const comp = actx.createDynamicsCompressor();
      comp.threshold.value = -10; comp.knee.value = 12; comp.ratio.value = 3.5; comp.attack.value = 0.004; comp.release.value = 0.18;
      const distGain = actx.createGain(); distGain.gain.value = 1; RAVE.distGain = distGain; // 会場からの距離で音量を絞る
      out.connect(distGain); distGain.connect(comp).connect(actx.destination);
      RAVE.master = out;
      const kb = actx.createGain(); kb.connect(makeShaper(3)).connect(out); RAVE.kickBus = kb;
      const rev = actx.createConvolver(); rev.buffer = makeReverbIR(fx.revLen, fx.revDecay);
      const revGain = actx.createGain(); revGain.gain.value = fx.revAmt; rev.connect(revGain).connect(out); RAVE.reverb = rev;
      const dl = actx.createDelay(1.0); dl.delayTime.value = 60 / RAVE.bpm * fx.dlyMul;
      const fb = actx.createGain(); fb.gain.value = fx.dlyFb;
      const dhp = actx.createBiquadFilter(); dhp.type = 'highpass'; dhp.frequency.value = 320;
      dl.connect(fb).connect(dl); dl.connect(dhp).connect(out); RAVE.delay = dl;
      const duck = actx.createGain(); duck.gain.value = 1; duck.connect(out); RAVE.duck = duck; RAVE.duckDepth = fx.duck;
      RAVE.audioStart = now + 0.12; RAVE.nextNote = RAVE.audioStart; RAVE.step = 0;
    }
    RAVE.on = true; raveInd.style.display = 'block'; raveInd.textContent = `${cfg.label} ♪${RAVE.songNo}  R/T/Y/U/I/O/P`;
  }
  function raveUpdate(dt) {
    if (!RAVE.on || !actx) return;
    while (RAVE.nextNote < actx.currentTime + 0.12) {
      scheduleStep(RAVE.step, RAVE.nextNote);
      RAVE.nextNote += SIXTEENTH(); RAVE.step++;
    }
    // 会場から離れるほど音量を下げる（水平距離ベース）
    if (RAVE.distGain && RAVE.group) {
      const dx = player.pos.x - RAVE.group.position.x, dz = player.pos.z - RAVE.group.position.z;
      const dist = Math.hypot(dx, dz), near = RAVE.radius + 2, far = near + 24;
      const vol = Math.max(0, Math.min(1, 1 - (dist - near) / (far - near)));
      RAVE.distGain.gain.setTargetAtTime(vol, actx.currentTime, 0.12);
    }
    const cfg = RAVE_VENUES[RAVE.kind], beat = (actx.currentTime - RAVE.audioStart) / (60 / RAVE.bpm);
    const ph = beat - Math.floor(beat), env = Math.pow(1 - ph, 2.2);
    RAVE.lights.forEach((L, i) => {
      const hue = (cfg.hue + beat * 0.07 + i / Math.max(1, RAVE.lights.length)) % 1;
      L.color.setHSL(hue, 1, 0.5); L.children[0].material.color.copy(L.color);
      L.intensity = 5 + env * 22;
      const a = beat * 0.5 + i * Math.PI * 2 / Math.max(1, RAVE.lights.length);
      L.position.set(Math.cos(a) * RAVE.radius * 0.68, 5.2, Math.sin(a) * RAVE.radius * 0.68);
    });
    RAVE.spots.forEach((S, i) => {
      S.color.setHSL((cfg.hue + beat * 0.11 + i * 0.5) % 1, 1, 0.55); S.intensity = 7 + env * 15;
      const sw = Math.sin(beat * 0.7 + i * Math.PI) * RAVE.radius * 0.75;
      S.target.position.set(sw, 0, Math.cos(beat * 0.5 + i) * RAVE.radius * 0.75);
    });
    const strobeOn = RAVE.kind === 'classic' ? (Math.floor(beat) % 2 === 0) : RAVE.kind === 'neon' ? true : RAVE.kind === 'laser' ? (Math.floor(beat) % 4 === 0) : RAVE.kind === 'future' ? ph < 0.18 : RAVE.kind === 'bass' ? Math.floor(beat * 2) % 4 === 0 : false;
    RAVE.strobe.intensity = ph < 0.06 && strobeOn ? 50 : 0;
    for (const m of RAVE.tiles) {
      if (RAVE.kind === 'neon') {
        const lane = m.userData.check ? 0.05 : 0.13;
        m.material.color.setHSL(lane, 1, 0.12 + env * (m.userData.check ? 0.42 : 0.22));
      } else if (RAVE.kind === 'forest') {
        m.material.color.setHSL((0.55 + m.userData.ij * 0.025 + beat * 0.035) % 1, 0.85, 0.13 + env * 0.24);
      } else if (RAVE.kind === 'laser') {
        m.material.color.setHSL(m.userData.check ? 0.12 : 0, m.userData.check ? 0.85 : 0, m.userData.check ? 0.62 + env * 0.25 : 0.06 + env * 0.16);
      } else if (RAVE.kind === 'future') {
        m.material.color.setHSL((0.76 + m.userData.ij * 0.035 + beat * 0.08) % 1, 0.95, 0.12 + env * 0.34);
      } else if (RAVE.kind === 'bass') {
        m.material.color.setHSL((0.31 + m.userData.ij * 0.01 + beat * 0.02) % 1, 0.95, 0.07 + env * 0.28);
      } else if (RAVE.kind === 'chill') {
        m.material.color.setHSL((0.62 + Math.sin(beat * 0.12 + m.userData.ij) * 0.05) % 1, 0.55, 0.1 + env * 0.12);
      } else {
        const hue = (cfg.hue + m.userData.ij * 0.06 + beat * 0.12) % 1;
        m.material.color.setHSL(hue, 0.95, 0.12 + 0.42 * env);
      }
    }
    RAVE.lasers.forEach((m, i) => {
      m.material.color.setHSL((cfg.hue + beat * 0.2 + i * 0.18) % 1, 1, 0.55);
      m.rotation.y = beat * 0.6 + i * (Math.PI * 2 / Math.max(1, RAVE.lasers.length));
      m.rotation.z = Math.sin(beat * 0.9 + i) * 0.5;
      m.material.opacity = 0.22 + env * 0.58;
    });
    RAVE.rings.forEach((r, i) => {
      r.material.color.setHSL((cfg.hue + beat * 0.12 + i * 0.17) % 1, 1, 0.56);
      r.rotation.z += dt * (0.4 + i * 0.12);
      r.scale.setScalar(1 + env * 0.12);
    });
    RAVE.pulses.forEach((m, i) => {
      if (m.material.emissive) m.material.emissive.setHSL((cfg.hue + beat * 0.1 + i * 0.2) % 1, 1, 0.16 + env * 0.35);
      else m.material.color.setHSL((cfg.hue + beat * 0.1 + i * 0.2) % 1, 1, 0.35 + env * 0.25);
    });
    if (RAVE.mirror) RAVE.mirror.rotation.y += dt * 1.5;
    const k = RAVE.kind;
    const crowdHype = Math.max(0, Math.sin(beat * Math.PI / 4)) ** 12;
    for (let di = 0; di < RAVE.dancers.length; di++) {
      const d = RAVE.dancers[di], isDJ = di === 0, ud = d.userData;
      const previousFrame = captureDancerFrame(d);
      const aL = ud.armL, aR = ud.armR, entry = isDJ ? null : updateDancerEntrance(d, dt, beat);
      if (entry && entry.waiting) continue;
      const home = isDJ ? (ud.home || d.position) : entry ? entry.home : updateDancerHome(d, k, beat);
      const facing = isDJ ? 0 : entry ? entry.facing : Math.atan2(-home.x, -home.z);
      const bd = beat + ud.beatOffset, pe = Math.abs(Math.sin(bd * Math.PI));
      // 前フレームの踊りのポーズが残らないよう関節を初期化
      ud.elbowL.rotation.set(0, 0, 0); ud.elbowR.rotation.set(0, 0, 0);
      ud.legL.rotation.set(0, 0, 0); ud.legR.rotation.set(0, 0, 0);
      ud.kneeL.rotation.set(0, 0, 0); ud.kneeR.rotation.set(0, 0, 0);
      ud.head.rotation.set(0, 0, 0); ud.hips.rotation.set(0, 0, 0);
      if (entry) {
        const entryMove = k === 'chill' ? 'sidestep' : entry.progress < 0.78 ? 'runningman' : 'shuffle';
        MOVES[entryMove](d, aL, aR, { home, facing, bd: bd * 1.35, pe, amp: ud.amp, dt, spin: ud.spin, sideX: ud.sideX, sideZ: ud.sideZ, ud });
        ud.head.rotation.y = Math.sin(beat * 1.7 + ud.moveSeed * 5) * 0.25 * (1 - entry.progress);
        smoothDancerFrame(d, previousFrame, 1 - Math.exp(-dt * 8));
        continue;
      }
      if (k === 'neon') {
        // ユーロビート: 全員同期のパラパラ風・高速振付＋同期ジャンプ（あえて揃える）
        d.position.set(home.x, home.y + Math.abs(Math.sin(beat * Math.PI)) * 0.3, home.z);
        d.rotation.set(0, facing, 0);
        const pose = beat * Math.PI;
        aL.rotation.z = -1.6 - Math.sin(pose) * 0.65; aL.rotation.x = Math.sin(pose * 0.5) * 1.0;
        aR.rotation.z = 1.6 + Math.sin(pose + Math.PI) * 0.65; aR.rotation.x = Math.sin(pose * 0.5 + Math.PI) * 1.0;
        setElbows(ud, -0.6 - Math.abs(Math.sin(pose)) * 0.5, -0.6 - Math.abs(Math.sin(pose + Math.PI)) * 0.5);
        smoothDancerFrame(d, previousFrame, 1 - Math.exp(-dt * 8));
        continue;
      }
      // 他ジャンルは各NPCが自分のタイミングで踊りをランダムに切り替える
      const pool = ud.behavior === 'battle' ? BATTLE_MOVES : MOVE_POOL[k] || MOVE_POOL.classic;
      const idx = Math.floor(beat / (ud.behavior === 'battle' ? 4 : 8) + ud.moveSeed * 9);
      const name = isDJ ? 'bounce' : pool[((idx % pool.length) + pool.length) % pool.length];
      MOVES[name](d, aL, aR, { home, facing, bd, pe, amp: ud.amp, dt, spin: ud.spin, sideX: ud.sideX, sideZ: ud.sideZ, ud });
      if (!isDJ && k !== 'chill' && crowdHype > 0.08 && ud.behavior !== 'stroll') {
        const wave = crowdHype * (0.65 + ud.amp * 0.35);
        d.position.y += wave * 0.18;
        aL.rotation.z -= wave * 0.65;
        aR.rotation.z += wave * 0.65;
      }
      smoothDancerFrame(d, previousFrame, 1 - Math.exp(-dt * (ud.behavior === 'battle' ? 9 : 6)));
    }
  }

  // 画面右上のレイブ表示
  const raveInd = document.createElement('div');
  raveInd.textContent = '🔊 RAVE ON';
  raveInd.style.cssText = 'position:fixed;right:12px;top:12px;z-index:10;color:#fff;font-weight:700;font-size:14px;padding:6px 12px;border-radius:8px;background:linear-gradient(90deg,#ff0066,#7a00ff);box-shadow:0 0 16px rgba(255,0,120,.7);display:none;pointer-events:none;';
  document.body.appendChild(raveInd);

  /* ============== メインループ ============== */
  let prev = performance.now();
  function animate() {
    requestAnimationFrame(animate);
    const now = performance.now(), dt = Math.min((now - prev) / 1000, 0.05); prev = now;

    if (started) {
      const f = (keys['KeyW'] ? 1 : 0) - (keys['KeyS'] ? 1 : 0);
      const s = (keys['KeyD'] ? 1 : 0) - (keys['KeyA'] ? 1 : 0);
      let mx = -Math.sin(yaw) * f + Math.cos(yaw) * s, mz = -Math.cos(yaw) * f - Math.sin(yaw) * s;
      const len = Math.hypot(mx, mz); if (len > 0) { mx /= len; mz /= len; }
      const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? SPRINT : WALK;
      player.vel.x = mx * spd; player.vel.z = mz * spd;
      player.vel.y -= GRAVITY * dt;
      if (keys['Space'] && player.onGround) {
        player.vel.y = JUMP; player.onGround = false;
      }
      moveAxis('x', player.vel.x * dt); moveAxis('z', player.vel.z * dt);
      player.onGround = false;
      if (moveAxis('y', player.vel.y * dt)) { if (player.vel.y < 0) player.onGround = true; player.vel.y = 0; }
      if (player.pos.y < -40) { player.pos.set(spawnX, spawnY, spawnZ); player.vel.set(0, 0, 0); }
    }

    // 無限ワールド：移動に応じて生成範囲（窓）を更新
    const pcol = Math.floor(player.pos.x), pcolz = Math.floor(player.pos.z);
    if (Math.max(Math.abs(pcol - winCX), Math.abs(pcolz - winCZ)) >= STEP) regenWindow(pcol, pcolz);

    camera.position.copy(player.pos);
    camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

    // 太陽と影をプレイヤーに追従
    sun.target.position.copy(player.pos);
    sun.position.copy(player.pos).add(SUN_OFFSET);
    sky.position.copy(camera.position);

    const tg = started ? pickTarget() : null;
    if (tg) { highlight.position.set(tg.block[0] + 0.5, tg.block[1] + 0.5, tg.block[2] + 0.5); highlight.visible = true; } else highlight.visible = false;

    for (const p of pPool) { if (p.life > 0) { p.life -= dt; p.vel.y -= 20 * dt; p.mesh.position.addScaledVector(p.vel, dt); if (p.life <= 0) p.mesh.visible = false; } }

    raveUpdate(dt);

    cloudTex.offset.x += dt * 0.004;
    clouds.position.x = camera.position.x; clouds.position.z = camera.position.z;
    TX.water.offset.x += dt * 0.02; TX.water.offset.y -= dt * 0.03; // 水面の流れ

    stats.textContent = `XYZ ${player.pos.x.toFixed(1)} / ${player.pos.y.toFixed(1)} / ${player.pos.z.toFixed(1)}　　選択: ${TYPES[HOTBAR[selected]].name}　　描画ブロック: ${coordsByType.reduce((a, c) => a + c.length, 0)}`;
    renderer.render(scene, camera);
  }
  regenWindow(Math.floor(player.pos.x), Math.floor(player.pos.z)); // 初期生成
  animate();
  window.__mcReady = true;
  </script>
</body>
